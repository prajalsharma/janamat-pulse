<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Janamat Pulse — logo system</title>
<style>
  body { margin:0; background:#0B1220; font-family: Helvetica Neue, Arial, sans-serif; color:#F5F7FA; padding:48px; }
  h1 { font-weight:600; font-size:22px; letter-spacing:-0.3px; margin:0 0 4px; }
  p.sub { color:#94A3B8; font-size:13px; margin:0 0 40px; }
  .row { display:flex; flex-wrap:wrap; gap:24px; margin-bottom:56px; }
  .card { background:#0F1830; border:1px solid rgba(245,247,250,0.08); border-radius:16px; padding:24px; display:flex; flex-direction:column; align-items:center; gap:14px; }
  .card.light { background:#F5F7FA; }
  .label { font-size:12px; letter-spacing:1.5px; color:#7DD3FC; text-transform:uppercase; }
  .card.light .label { color:#0B7285; }
  .sq { width:120px; height:120px; }
  .fav-wrap { display:flex; align-items:flex-end; gap:28px; }
  .fav-wrap .unit { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .fav-bg { background:#0B1220; border:1px solid rgba(245,247,250,0.12); border-radius:6px; display:flex; align-items:center; justify-content:center; }
</style>
</head>
<body>

<h1>Janamat Pulse — logo system</h1>
<p class="sub">Icon mark, wordmark lockup, monochrome and light/dark variants, favicon-scale proof</p>

<div class="label" style="margin-bottom:14px;">01 · Primary icon mark (app-icon safe)</div>
<div class="row">
  <div class="card">
    <svg class="sq" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="0" width="200" height="200" rx="40" fill="#0B1220"/>
      <circle cx="100" cy="100" r="80" fill="none" stroke="#F5F7FA" stroke-opacity="0.12" stroke-width="2"/>
      <circle cx="40" cy="110" r="6" fill="#E23252"/>
      <path d="M40,110 L62,110 L72,94 L82,110 L96,110" fill="none" stroke="#22D3EE" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M96,110 L112,132 L156,64" fill="none" stroke="#9945FF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="156" cy="64" r="5" fill="#22D3EE"/>
    </svg>
  </div>
</div>

<div class="label" style="margin-bottom:14px;">02 · Horizontal lockup</div>
<div class="row">
  <div class="card" style="width:520px;">
    <svg width="100%" viewBox="0 0 640 180" xmlns="http://www.w3.org/2000/svg">
      <g transform="translate(24,20) scale(0.7)">
        <circle cx="100" cy="100" r="80" fill="none" stroke="#F5F7FA" stroke-opacity="0.12" stroke-width="2.4"/>
        <circle cx="40" cy="110" r="7" fill="#E23252"/>
        <path d="M40,110 L62,110 L72,94 L82,110 L96,110" fill="none" stroke="#22D3EE" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M96,110 L112,132 L156,64" fill="none" stroke="#9945FF" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="156" cy="64" r="6" fill="#22D3EE"/>
      </g>
      <text x="196" y="103" font-size="46" font-weight="600" letter-spacing="-0.5" fill="#F5F7FA">Janamat<tspan fill="#22D3EE" font-weight="300"> Pulse</tspan></text>
      <text x="197" y="134" font-size="13" letter-spacing="3" fill="#F5F7FA" fill-opacity="0.45">CIVIC SIGNAL · ON-CHAIN</text>
    </svg>
  </div>
  <div class="card light" style="width:520px;">
    <svg width="100%" viewBox="0 0 640 180" xmlns="http://www.w3.org/2000/svg">
      <rect x="24" y="20" width="140" height="140" rx="28" fill="#0B1220"/>
      <g transform="translate(24,20) scale(0.7)">
        <circle cx="100" cy="100" r="80" fill="none" stroke="#F5F7FA" stroke-opacity="0.12" stroke-width="2.4"/>
        <circle cx="40" cy="110" r="7" fill="#E23252"/>
        <path d="M40,110 L62,110 L72,94 L82,110 L96,110" fill="none" stroke="#22D3EE" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M96,110 L112,132 L156,64" fill="none" stroke="#9945FF" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="156" cy="64" r="6" fill="#22D3EE"/>
      </g>
      <text x="196" y="103" font-size="46" font-weight="600" letter-spacing="-0.5" fill="#0B1220">Janamat<tspan fill="#0B7285" font-weight="300"> Pulse</tspan></text>
      <text x="197" y="134" font-size="13" letter-spacing="3" fill="#0B1220" fill-opacity="0.45">CIVIC SIGNAL · ON-CHAIN</text>
    </svg>
  </div>
</div>

<div class="label" style="margin-bottom:14px;">03 · Monochrome</div>
<div class="row">
  <div class="card">
    <svg class="sq" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="80" fill="none" stroke="#F5F7FA" stroke-opacity="0.15" stroke-width="2"/>
      <circle cx="40" cy="110" r="6" fill="#F5F7FA"/>
      <path d="M40,110 L62,110 L72,94 L82,110 L96,110" fill="none" stroke="#F5F7FA" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M96,110 L112,132 L156,64" fill="none" stroke="#F5F7FA" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="156" cy="64" r="5" fill="#F5F7FA"/>
    </svg>
    <div class="label">All-white, on dark</div>
  </div>
  <div class="card light">
    <svg class="sq" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="80" fill="none" stroke="#0B1220" stroke-opacity="0.12" stroke-width="2"/>
      <circle cx="40" cy="110" r="6" fill="#0B1220"/>
      <path d="M40,110 L62,110 L72,94 L82,110 L96,110" fill="none" stroke="#0B1220" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M96,110 L112,132 L156,64" fill="none" stroke="#0B1220" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="156" cy="64" r="5" fill="#0B1220"/>
    </svg>
    <div class="label">All-ink, on light</div>
  </div>
</div>

<div class="label" style="margin-bottom:14px;">04 · Scale proof</div>
<div class="row">
  <div class="card" style="flex-direction:row; align-items:flex-end; gap:28px;">
    <div class="fav-wrap">
      <div class="unit">
        <div class="fav-bg" style="width:32px; height:32px;">
          <svg width="26" height="26" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <circle cx="40" cy="110" r="9" fill="#E23252"/>
            <path d="M40,110 L62,110 L72,94 L82,110 L96,110" fill="none" stroke="#22D3EE" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M96,110 L112,132 L156,64" fill="none" stroke="#9945FF" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="label" style="font-size:10px;">32px</div>
      </div>
      <div class="unit">
        <div class="fav-bg" style="width:64px; height:64px; border-radius:12px;">
          <svg width="52" height="52" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <circle cx="40" cy="110" r="9" fill="#E23252"/>
            <path d="M40,110 L62,110 L72,94 L82,110 L96,110" fill="none" stroke="#22D3EE" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M96,110 L112,132 L156,64" fill="none" stroke="#9945FF" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="label" style="font-size:10px;">64px</div>
      </div>
      <div class="unit">
        <div class="fav-bg" style="width:120px; height:120px; border-radius:22px;">
          <svg width="100" height="100" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <circle cx="100" cy="100" r="80" fill="none" stroke="#F5F7FA" stroke-opacity="0.12" stroke-width="2"/>
            <circle cx="40" cy="110" r="6" fill="#E23252"/>
            <path d="M40,110 L62,110 L72,94 L82,110 L96,110" fill="none" stroke="#22D3EE" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M96,110 L112,132 L156,64" fill="none" stroke="#9945FF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="156" cy="64" r="5" fill="#22D3EE"/>
          </svg>
        </div>
        <div class="label" style="font-size:10px;">120px</div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
