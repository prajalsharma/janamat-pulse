<svg width="680" height="230" viewBox="0 0 680 230" xmlns="http://www.w3.org/2000/svg" role="img">
<title>SolVane logo</title>
<desc>Logo for SolVane, an AI news-sentiment trading agent on Solana. A single connected shape resembling a breaking-news flag on a rising pole, filled with Solana's purple-to-green gradient, sits inside a dark rounded badge. Wordmark and tagline sit to the right.</desc>
<defs>
<linearGradient id="shapeGrad" x1="55" y1="185" x2="165" y2="65" gradientUnits="userSpaceOnUse">
<stop offset="0%" stop-color="#9945FF"/>
<stop offset="100%" stop-color="#14F195"/>
</linearGradient>
</defs>

<rect x="40" y="40" width="160" height="160" rx="32" fill="#0B0B14"/>

<polygon points="71.41,182.44 60.59,173.56 158,66" fill="url(#shapeGrad)"/>

<path d="M 95.35 142.21 Q 58 124, 72.6 106.88 Q 96 118, 111.65 122.35 Z" fill="url(#shapeGrad)"/>

<text x="220" y="122" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="700" fill="#15151F" letter-spacing="0.2">Sol<tspan fill="#0E8F63">Vane</tspan></text>

<rect x="221" y="134" width="66" height="2" fill="#14F195"/>

<text x="220" y="160" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#6B6B7A" letter-spacing="0.5">News-sentiment trading agent for Solana</text>
</svg>
